<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit And Remove Elements in Dom</title>
  </head>
  <body style="background-color: #212121; color: #fff">
    <ul class="language">
      <li>JavaScript</li>
    </ul>
  </body>
  <script>
    function addLanguage(langName) {
      const li = document.createElement("li");
      li.innerHTML = langName;
      const ul = document.querySelector(".language");
      ul.appendChild(li);
    }
    addLanguage("python");
    addLanguage("C");

    function addOptiLanguage(langName) {
      const li = document.createElement("li");
      li.appendChild(document.createTextNode(langName));
      document.querySelector(".language").appendChild(li);
    }
    addOptiLanguage("Java");

    //Edit
    const ThirdLang = document.querySelector("li:nth-child(3)"); //What :nth-child() actually does=>It selects an element based on its position among its siblings (not just among elements of the same tag — among all children of its parent).
    //ThirdLang.innerHTML="ruby"
    const newli = document.createElement("li");
    newli.textContent = "ruby";
    ThirdLang.replaceWith(newli);

    const firstchild = document.querySelector("li:first-child");
    firstchild.outerHTML = "<li>Node.js</li>";

    //remove
    const lastlang = document.querySelector("li:last-child");
    lastlang.remove();
  </script>
</html>
